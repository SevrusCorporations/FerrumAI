name: Deploy MkDocs Documentation

on:
  push:
    tags:
      - 'v*'        # triggers on version tags like v1.0.0, v1.1.0
  workflow_dispatch: # optional manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings griffe

      # 4️⃣ Determine version and set folder
      - name: Set DOC_VERSION
        id: version
        run: |
          echo "DOC_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "CUSTOM_SITE_DIR=site/$DOC_VERSION" >> $GITHUB_ENV

      # 5️⃣ Build the docs
      - name: Build Documentation
        run: mkdocs build --site-dir $CUSTOM_SITE_DIR

      # 6️⃣ Deploy versioned docs
      - name: Deploy Versioned Docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages
          mkdir -p site
          cp -r $CUSTOM_SITE_DIR site/$DOC_VERSION
          git add site/$DOC_VERSION
          git commit -m "Deploy documentation version $DOC_VERSION" || echo "No changes to commit"
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages

      # 7️⃣ Update latest folder
      - name: Update Latest Docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp -r $CUSTOM_SITE_DIR site/latest
          git add site/latest
          git commit -m "Update latest docs for $DOC_VERSION" || echo "No changes to commit"
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages
