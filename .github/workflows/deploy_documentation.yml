name: Deploy MkDocs Documentation

on:
  push:
    tags:
      - 'v*'        # Trigger on version tags like v1.0.0, v1.1.0
  workflow_dispatch:  # Optional manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build MkDocs Site
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python] griffe

      # 4️⃣ Determine documentation version
      - name: Set DOC_VERSION
        id: version
        run: |
          echo "DOC_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "SITE_DIR=site/${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # 5️⃣ Build documentation
      - name: Build versioned documentation
        run: mkdocs build --clean --site-dir $SITE_DIR

      # 6️⃣ Copy to "latest" directory for convenience
      - name: Duplicate as 'latest' docs
        run: |
          mkdir -p site/latest
          cp -r $SITE_DIR/* site/latest/

      # 7️⃣ Upload site artifact for deployment
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
