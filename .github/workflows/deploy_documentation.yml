name: Deploy MkDocs Documentation

on:
  push:
    tags:
      - 'v*'        # triggers on version tags like v1.0.0, v1.1.0
  workflow_dispatch: # optional manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # fetch all history for proper tagging

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          pip install mkdocstrings[python] griffe

      # 4️⃣ Determine version and set folder
      - name: Set DOC_VERSION
        id: version
        run: |
          echo "DOC_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "CUSTOM_SITE_DIR=site/$DOC_VERSION" >> $GITHUB_ENV

      # 5️⃣ Build the docs
      - name: Build Documentation
        run: mkdocs build --site-dir $CUSTOM_SITE_DIR

      # 6️⃣ Deploy to gh-pages
      - name: Deploy Docs to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch (or create if missing)
          git clone --branch gh-pages https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages || \
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages && cd gh-pages && git checkout --orphan gh-pages

          cd gh-pages
          
          # Make versioned folder
          mkdir -p "site/$DOC_VERSION"
          cp -r "../$CUSTOM_SITE_DIR/"* "site/$DOC_VERSION/"

          # Update latest
          mkdir -p site/latest
          cp -r "../$CUSTOM_SITE_DIR/"* site/latest/

          # Commit and push
          git add .
          git commit -m "Deploy documentation for $DOC_VERSION" || echo "No changes to commit"
          git push -f origin gh-pages
