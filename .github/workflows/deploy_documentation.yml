name: Deploy MkDocs Documentation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          pip install mkdocstrings[python] griffe

      - name: Set DOC_VERSION
        id: version
        run: |
          echo "DOC_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "CUSTOM_SITE_DIR=site/$DOC_VERSION" >> $GITHUB_ENV

      - name: Build Documentation
        run: mkdocs build --site-dir $CUSTOM_SITE_DIR

      - name: Deploy Docs to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone repo (if branch exists) or initialize new gh-pages branch
          if git ls-remote --exit-code --heads https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages; then
            git clone --branch gh-pages https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages
            cd gh-pages
          else
            mkdir gh-pages
            cd gh-pages
            git init
            git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
          fi

          # Copy new docs
          mkdir -p "site/$DOC_VERSION"
          cp -r "../$CUSTOM_SITE_DIR/"* "site/$DOC_VERSION/"
          mkdir -p site/latest
          cp -r "../$CUSTOM_SITE_DIR/"* site/latest/

          # Commit and push
          git add .
          git commit -m "Deploy documentation for $DOC_VERSION" || echo "No changes to commit"
          git push -f origin gh-pages
